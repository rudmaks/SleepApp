plugins {
    id 'com.android.application'
}

android {
    namespace 'com.sleepapp'
    compileSdk 34

    defaultConfig {
        applicationId "com.sleepapp"
        minSdk 29
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    buildTypes {
        debug {
            debuggable true
        }
    }
}

dependencies {
    // Зависимостей нет — только Android API
}
